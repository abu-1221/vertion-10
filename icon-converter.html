<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JMC Test - PWA Icon Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { 
      text-align: center; 
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #e0e7ff, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .controls {
      text-align: center;
      margin-bottom: 2rem;
    }
    button {
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin: 0.5rem;
      transition: all 0.3s;
    }
    button:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .btn-download {
      background: linear-gradient(135deg, #059669, #10b981);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .icon-card {
      background: rgba(30, 27, 75, 0.5);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }
    .icon-card canvas {
      border-radius: 16px;
      margin-bottom: 0.75rem;
      max-width: 100%;
      height: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .icon-card .label {
      color: #a5b4fc;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .icon-card a {
      display: inline-block;
      margin-top: 0.5rem;
      color: #6366f1;
      font-size: 0.8rem;
      text-decoration: none;
    }
    .status {
      text-align: center;
      padding: 1rem;
      margin: 1rem auto;
      max-width: 600px;
      border-radius: 12px;
      font-weight: 600;
    }
    .status.success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }
    .status.info {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>🎨 JMC Test — PWA Icon Generator</h1>
  <p class="subtitle">Generate all required PWA icons from your logo</p>
  
  <div class="controls">
    <button onclick="generateAllIcons()">⚡ Generate All Icons</button>
    <button class="btn-download hidden" id="downloadAllBtn" onclick="downloadAll()">📥 Download All PNGs</button>
  </div>

  <div id="statusArea"></div>
  <div class="grid" id="iconGrid"></div>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
    const SCREENSHOT_SIZES = [
      { name: 'screenshot-wide', w: 1280, h: 720 },
      { name: 'screenshot-narrow', w: 720, h: 1280 }
    ];
    
    const generatedBlobs = {};

    function showStatus(message, type = 'info') {
      document.getElementById('statusArea').innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    async function generateAllIcons() {
      showStatus('⏳ Loading logo and generating icons...', 'info');
      const grid = document.getElementById('iconGrid');
      grid.innerHTML = '';

      // Load the logo
      const logo = new Image();
      logo.crossOrigin = 'anonymous';
      
      logo.onload = () => {
        // Generate each icon size
        SIZES.forEach(size => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');

          // Draw background gradient
          const gradient = ctx.createLinearGradient(0, 0, size, size);
          gradient.addColorStop(0, '#1e1b4b');
          gradient.addColorStop(0.5, '#312e81');
          gradient.addColorStop(1, '#4338ca');
          
          // Rounded rectangle background
          const radius = size * 0.18;
          ctx.beginPath();
          ctx.moveTo(radius, 0);
          ctx.lineTo(size - radius, 0);
          ctx.quadraticCurveTo(size, 0, size, radius);
          ctx.lineTo(size, size - radius);
          ctx.quadraticCurveTo(size, size, size - radius, size);
          ctx.lineTo(radius, size);
          ctx.quadraticCurveTo(0, size, 0, size - radius);
          ctx.lineTo(0, radius);
          ctx.quadraticCurveTo(0, 0, radius, 0);
          ctx.closePath();
          ctx.fillStyle = gradient;
          ctx.fill();

          // Draw logo centered with padding
          const padding = size * 0.12;
          const logoSize = size - (padding * 2);
          const x = (size - logoSize) / 2;
          const y = (size - logoSize) / 2;
          
          // Clip to rounded rect for the logo
          ctx.save();
          ctx.beginPath();
          const innerRadius = size * 0.12;
          ctx.moveTo(x + innerRadius, y);
          ctx.lineTo(x + logoSize - innerRadius, y);
          ctx.quadraticCurveTo(x + logoSize, y, x + logoSize, y + innerRadius);
          ctx.lineTo(x + logoSize, y + logoSize - innerRadius);
          ctx.quadraticCurveTo(x + logoSize, y + logoSize, x + logoSize - innerRadius, y + logoSize);
          ctx.lineTo(x + innerRadius, y + logoSize);
          ctx.quadraticCurveTo(x, y + logoSize, x, y + logoSize - innerRadius);
          ctx.lineTo(x, y + innerRadius);
          ctx.quadraticCurveTo(x, y, x + innerRadius, y);
          ctx.closePath();
          ctx.clip();
          
          ctx.drawImage(logo, x, y, logoSize, logoSize);
          ctx.restore();

          // Add subtle border glow
          ctx.beginPath();
          ctx.moveTo(radius, 0);
          ctx.lineTo(size - radius, 0);
          ctx.quadraticCurveTo(size, 0, size, radius);
          ctx.lineTo(size, size - radius);
          ctx.quadraticCurveTo(size, size, size - radius, size);
          ctx.lineTo(radius, size);
          ctx.quadraticCurveTo(0, size, 0, size - radius);
          ctx.lineTo(0, radius);
          ctx.quadraticCurveTo(0, 0, radius, 0);
          ctx.closePath();
          ctx.strokeStyle = 'rgba(129, 140, 248, 0.3)';
          ctx.lineWidth = Math.max(1, size * 0.015);
          ctx.stroke();

          // Create card
          const card = document.createElement('div');
          card.className = 'icon-card';
          
          // Display canvas
          const displayCanvas = document.createElement('canvas');
          displayCanvas.width = Math.min(size, 180);
          displayCanvas.height = Math.min(size, 180);
          const dCtx = displayCanvas.getContext('2d');
          dCtx.drawImage(canvas, 0, 0, displayCanvas.width, displayCanvas.height);
          
          card.appendChild(displayCanvas);
          card.innerHTML += `<div class="label">icon-${size}x${size}.png</div>`;
          
          // Save blob
          canvas.toBlob(blob => {
            generatedBlobs[`icon-${size}x${size}.png`] = blob;
            const url = URL.createObjectURL(blob);
            card.innerHTML += `<a href="${url}" download="icon-${size}x${size}.png">💾 Download</a>`;
          }, 'image/png');
          
          grid.appendChild(card);
        });

        // Generate screenshots
        SCREENSHOT_SIZES.forEach(({ name, w, h }) => {
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');

          // Background
          const gradient = ctx.createLinearGradient(0, 0, w, h);
          gradient.addColorStop(0, '#0a0f1e');
          gradient.addColorStop(1, '#1e1b4b');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, w, h);

          // Logo in center
          const logoSize = Math.min(w, h) * 0.3;
          ctx.drawImage(logo, (w - logoSize) / 2, h * 0.2, logoSize, logoSize);

          // Title
          ctx.fillStyle = '#e0e7ff';
          ctx.font = `bold ${w > h ? 48 : 36}px Arial`;
          ctx.textAlign = 'center';
          ctx.fillText('JMC Test', w / 2, h * 0.65);

          // Subtitle
          ctx.fillStyle = '#a5b4fc';
          ctx.font = `${w > h ? 24 : 18}px Arial`;
          ctx.fillText('Career Development Centre', w / 2, h * 0.73);

          canvas.toBlob(blob => {
            generatedBlobs[`${name}.png`] = blob;
          }, 'image/png');
        });

        showStatus('✅ All icons generated successfully! Click individual download links or use "Download All PNGs".', 'success');
        document.getElementById('downloadAllBtn').classList.remove('hidden');
      };

      logo.onerror = () => {
        // Fallback: generate text-based icons without logo
        showStatus('⚠️ Logo not found. Generating text-based icons...', 'info');
        generateTextIcons(grid);
      };

      logo.src = '/logo.png';
    }

    function generateTextIcons(grid) {
      SIZES.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Background
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#1e1b4b');
        gradient.addColorStop(0.5, '#312e81');
        gradient.addColorStop(1, '#4338ca');

        const radius = size * 0.18;
        roundRect(ctx, 0, 0, size, size, radius);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Inner border
        roundRect(ctx, size * 0.08, size * 0.08, size * 0.84, size * 0.84, size * 0.12);
        ctx.strokeStyle = 'rgba(129,140,248,0.3)';
        ctx.lineWidth = Math.max(1, size * 0.015);
        ctx.stroke();

        // "JMC" text
        ctx.fillStyle = '#e0e7ff';
        ctx.font = `900 ${size * 0.28}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('JMC', size / 2, size * 0.42);

        // "TEST" text
        ctx.fillStyle = '#a5b4fc';
        ctx.font = `700 ${size * 0.14}px Arial`;
        ctx.fillText('TEST', size / 2, size * 0.68);

        const card = document.createElement('div');
        card.className = 'icon-card';
        
        const displayCanvas = document.createElement('canvas');
        displayCanvas.width = Math.min(size, 180);
        displayCanvas.height = Math.min(size, 180);
        const dCtx = displayCanvas.getContext('2d');
        dCtx.drawImage(canvas, 0, 0, displayCanvas.width, displayCanvas.height);
        
        card.appendChild(displayCanvas);
        card.innerHTML += `<div class="label">icon-${size}x${size}.png</div>`;
        
        canvas.toBlob(blob => {
          generatedBlobs[`icon-${size}x${size}.png`] = blob;
          const url = URL.createObjectURL(blob);
          card.innerHTML += `<a href="${url}" download="icon-${size}x${size}.png">💾 Download</a>`;
        }, 'image/png');
        
        grid.appendChild(card);
      });

      showStatus('✅ Text-based icons generated! Click "Download All PNGs" to save.', 'success');
      document.getElementById('downloadAllBtn').classList.remove('hidden');
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function downloadAll() {
      Object.entries(generatedBlobs).forEach(([filename, blob], index) => {
        setTimeout(() => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
        }, index * 300); // Stagger downloads
      });
    }
  </script>
</body>
</html>
