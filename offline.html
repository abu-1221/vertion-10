<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | JMC Test</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-animation::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
      border-radius: 50%;
      top: -100px;
      right: -100px;
      animation: pulse 6s ease-in-out infinite;
    }
    .bg-animation::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.1), transparent 70%);
      border-radius: 50%;
      bottom: -80px;
      left: -80px;
      animation: pulse 8s ease-in-out infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    .offline-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(99,102,241,0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .offline-icon svg {
      width: 56px;
      height: 56px;
      stroke: #818cf8;
      stroke-width: 1.5;
      fill: none;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      color: #94a3b8;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.5);
    }
    .retry-btn:active {
      transform: translateY(0);
    }
    .retry-btn svg {
      width: 20px;
      height: 20px;
    }

    .offline-tip {
      margin-top: 2.5rem;
      padding: 1rem 1.5rem;
      background: rgba(30, 27, 75, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      font-size: 0.85rem;
      color: #a5b4fc;
    }
    .offline-tip strong {
      color: #c7d2fe;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      p { font-size: 0.95rem; }
      .offline-icon { width: 100px; height: 100px; }
      .offline-icon svg { width: 44px; height: 44px; }
    }
  </style>
</head>

<body>
  <div class="bg-animation"></div>

  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 015.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0122.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 014.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 016.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry — your data is safe. Please check your connection and try again.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>

    <div class="offline-tip">
      <strong>💡 Tip:</strong> Previously visited pages may still be available from cache. 
      Try navigating to a page you've visited before.
    </div>
  </div>
</body>

</html>
